<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의하기</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .card h1 {
            color: #fff;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 8px;
        }

        .card p.subtitle {
            color: rgba(255,255,255,0.5);
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 32px;
        }

        label {
            display: block;
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
            margin-bottom: 6px;
            margin-top: 16px;
        }

        label .optional {
            color: rgba(255,255,255,0.35);
            font-size: 0.75rem;
            margin-left: 4px;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            font-family: 'Segoe UI', sans-serif;
            transition: border-color 0.2s;
            outline: none;
            resize: none;
        }

        input[type="text"]:focus, textarea:focus {
            border-color: #5865f2;
            background: rgba(88, 101, 242, 0.1);
        }

        input[type="text"]::placeholder, textarea::placeholder {
            color: rgba(255,255,255,0.25);
        }

        textarea {
            height: 120px;
        }

        button[type="submit"] {
            margin-top: 28px;
            width: 100%;
            padding: 13px;
            background: #5865f2;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button[type="submit"]:hover { background: #4752c4; }
        button[type="submit"]:active { transform: scale(0.98); }
        button[type="submit"]:disabled { background: #444; cursor: not-allowed; }

        .message {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
            display: none;
        }

        .message.success {
            background: rgba(87, 242, 135, 0.15);
            border: 1px solid rgba(87, 242, 135, 0.3);
            color: #57f287;
        }

        .message.error {
            background: rgba(237, 66, 69, 0.15);
            border: 1px solid rgba(237, 66, 69, 0.3);
            color: #ed4245;
        }

        .nav {
            text-align: center;
            margin-top: 20px;
        }

        .nav a {
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav a:hover { color: rgba(255,255,255,0.7); }
    </style>
</head>
<body>
    <div class="card">
        <h1>문의하기</h1>
        <p class="subtitle">문의 내용을 작성하면 관리자에게 전달됩니다</p>

        <form id="inquiryForm">
            <label for="forest_nick">숲 닉네임</label>
            <input type="text" id="forest_nick" name="forest_nick" placeholder="숲(SOOP) 닉네임 입력" required>

            <label for="minecraft_nick">마인크래프트 닉네임 <span class="optional">(선택)</span></label>
            <input type="text" id="minecraft_nick" name="minecraft_nick" placeholder="마크 닉네임 입력">

            <label for="content">문의 내용</label>
            <textarea id="content" name="content" placeholder="문의 내용을 입력해주세요" required></textarea>

            <button type="submit" id="submitBtn">문의 보내기</button>
        </form>

        <div class="message" id="resultMsg"></div>

        <div class="nav">
            <a href="/">화이트리스트 신청으로 돌아가기</a>
        </div>
    </div>

    <script>
        document.getElementById("inquiryForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const btn = document.getElementById("submitBtn");
            const msg = document.getElementById("resultMsg");
            const formData = new FormData(this);

            btn.disabled = true;
            btn.textContent = "전송 중...";
            msg.style.display = "none";

            try {
                const res = await fetch("/inquiry/submit", { method: "POST", body: formData });
                const data = await res.json();

                msg.textContent = data.message;
                msg.className = "message " + (data.success ? "success" : "error");
                msg.style.display = "block";

                if (data.success) {
                    this.reset();
                    btn.textContent = "전송 완료";
                } else {
                    btn.disabled = false;
                    btn.textContent = "문의 보내기";
                }
            } catch {
                msg.textContent = "서버 오류가 발생했습니다. 다시 시도해주세요.";
                msg.className = "message error";
                msg.style.display = "block";
                btn.disabled = false;
                btn.textContent = "문의 보내기";
            }
        });
    </script>
</body>
</html>
